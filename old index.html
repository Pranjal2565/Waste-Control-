<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryana Waste Management Control</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Haryana Waste Management Control System</h1>
        <div class="stats-bar">
            <span>Total Red Flags: <b id="totalFlags">0</b></span>
            <span>Active Regions: <b id="activeRegions">0</b></span>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="container">
        <!-- Map Section -->
        <div class="map-section">
            <div class="map-container">
                <img src="images/haryana-map.svg" alt="Haryana Map" id="haryanaMap">
                <div id="mapMarkers"></div>
            </div>
            <div class="legend">
                <span class="legend-item"><span class="dot safe"></span> 0-2 Flags</span>
                <span class="legend-item"><span class="dot warning"></span> 3 Flags (Action)</span>
                <span class="legend-item"><span class="dot critical"></span> 4+ Flags</span>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Region Selection -->
            <div class="panel">
                <h2>Raise a Red Flag</h2>
                <form id="flagForm">
                    <select id="regionSelect" required>
                        <option value="">Select Region</option>
                    </select>
                    <select id="issueType" required>
                        <option value="">Select Issue</option>
                        <option value="garbage">Garbage Pile-up</option>
                        <option value="stagnant_water">Stagnant Water</option>
                    </select>
                    <textarea id="description" placeholder="Additional details..." rows="3"></textarea>
                    <button type="submit">Submit Red Flag 🚩</button>
                </form>
            </div>

            <!-- Cleaning Log -->
            <div class="panel">
                <h2>Cleaning Log</h2>
                <div class="filter">
                    <input type="date" id="logDateFilter">
                    <select id="logRegionFilter">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div id="cleaningLog" class="log-container">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <!-- Region Detail Modal -->
    <div id="regionModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
